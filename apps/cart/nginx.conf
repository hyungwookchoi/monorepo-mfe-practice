server {
  listen 80;
  server_name _;

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location /remotes/cart/ {
    alias /usr/share/nginx/html/;
    try_files $uri $uri/ /index.html;
  }

  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
  }
}

