name: Deploy to ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_all:
        description: Deploy every MFE image regardless of changed paths
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

concurrency:
  group: ecs-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
  PUBLIC_ORIGIN: ${{ vars.PUBLIC_ORIGIN }}

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Typecheck
        run: pnpm lint

      - name: Unit and component tests
        run: pnpm test

      - name: Production build
        run: pnpm build

      - name: E2E
        run: pnpm e2e

  changes:
    name: Detect changed MFEs
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      has_changes: ${{ steps.matrix.outputs.has_changes }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect path changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            host:
              - 'apps/host/**'
              - 'packages/ui/**'
              - 'packages/contracts/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - 'tsconfig.base.json'
            catalog:
              - 'apps/catalog/**'
              - 'packages/ui/**'
              - 'packages/contracts/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - 'tsconfig.base.json'
            cart:
              - 'apps/cart/**'
              - 'packages/ui/**'
              - 'packages/contracts/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - 'tsconfig.base.json'
            checkout:
              - 'apps/checkout/**'
              - 'packages/ui/**'
              - 'packages/contracts/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - 'tsconfig.base.json'

      - name: Build deploy matrix
        id: matrix
        env:
          DEPLOY_ALL: ${{ inputs.deploy_all || false }}
          HOST_CHANGED: ${{ steps.filter.outputs.host }}
          CATALOG_CHANGED: ${{ steps.filter.outputs.catalog }}
          CART_CHANGED: ${{ steps.filter.outputs.cart }}
          CHECKOUT_CHANGED: ${{ steps.filter.outputs.checkout }}
        run: |
          node <<'NODE'
          const apps = [
            {
              app: "host",
              changed: process.env.HOST_CHANGED === "true",
              dockerfile: "apps/host/Dockerfile",
              ecrRepository: "mfe-host",
              service: "mfe-host-service",
              taskDefinition: "infra/ecs/task-definitions/host.json",
              containerName: "host",
              basePath: "/",
              remote: false
            },
            {
              app: "catalog",
              changed: process.env.CATALOG_CHANGED === "true",
              dockerfile: "apps/catalog/Dockerfile",
              ecrRepository: "mfe-catalog",
              service: "mfe-catalog-service",
              taskDefinition: "infra/ecs/task-definitions/catalog.json",
              containerName: "catalog",
              basePath: "/remotes/catalog/",
              remote: true
            },
            {
              app: "cart",
              changed: process.env.CART_CHANGED === "true",
              dockerfile: "apps/cart/Dockerfile",
              ecrRepository: "mfe-cart",
              service: "mfe-cart-service",
              taskDefinition: "infra/ecs/task-definitions/cart.json",
              containerName: "cart",
              basePath: "/remotes/cart/",
              remote: true
            },
            {
              app: "checkout",
              changed: process.env.CHECKOUT_CHANGED === "true",
              dockerfile: "apps/checkout/Dockerfile",
              ecrRepository: "mfe-checkout",
              service: "mfe-checkout-service",
              taskDefinition: "infra/ecs/task-definitions/checkout.json",
              containerName: "checkout",
              basePath: "/remotes/checkout/",
              remote: true
            }
          ];
          const deployAll = process.env.DEPLOY_ALL === "true";
          const include = apps.filter((app) => deployAll || app.changed);
          const matrix = { include };
          console.log(`matrix=${JSON.stringify(matrix)}`);
          require("node:fs").appendFileSync(
            process.env.GITHUB_OUTPUT,
            `matrix=${JSON.stringify(matrix)}\nhas_changes=${include.length > 0}\n`
          );
          NODE

  deploy:
    name: Deploy ${{ matrix.app }}
    runs-on: ubuntu-latest
    needs:
      - quality
      - changes
    if: needs.changes.outputs.has_changes == 'true'
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.changes.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ matrix.ecrRepository }}
          IMAGE_TAG: ${{ github.sha }}
          APP_BASE_PATH: ${{ matrix.basePath }}
          CATALOG_REMOTE_URL: catalog@${{ env.PUBLIC_ORIGIN }}/remotes/catalog/mf-manifest.json
          CART_REMOTE_URL: cart@${{ env.PUBLIC_ORIGIN }}/remotes/cart/mf-manifest.json
          CHECKOUT_REMOTE_URL: checkout@${{ env.PUBLIC_ORIGIN }}/remotes/checkout/mf-manifest.json
        run: |
          docker build \
            -f "${{ matrix.dockerfile }}" \
            --build-arg VITE_PUBLIC_BASE_PATH="${APP_BASE_PATH}" \
            --build-arg VITE_CATALOG_REMOTE_URL="${CATALOG_REMOTE_URL}" \
            --build-arg VITE_CART_REMOTE_URL="${CART_REMOTE_URL}" \
            --build-arg VITE_CHECKOUT_REMOTE_URL="${CHECKOUT_REMOTE_URL}" \
            -t "${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}" \
            -t "${ECR_REGISTRY}/${ECR_REPOSITORY}:main-latest" \
            .
          docker push "${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          docker push "${ECR_REGISTRY}/${ECR_REPOSITORY}:main-latest"
          echo "image=${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}" >> "$GITHUB_ENV"

      - name: Render ECS task definition
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ matrix.taskDefinition }}
          container-name: ${{ matrix.containerName }}
          image: ${{ env.image }}

      - name: Deploy ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: ${{ matrix.service }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  smoke:
    name: Smoke test public routes
    runs-on: ubuntu-latest
    needs: deploy
    if: always() && needs.deploy.result == 'success'
    timeout-minutes: 5

    steps:
      - name: Check host and remote manifests
        run: |
          curl -fsS "${PUBLIC_ORIGIN}/" >/dev/null
          curl -fsS "${PUBLIC_ORIGIN}/remotes/catalog/mf-manifest.json" >/dev/null
          curl -fsS "${PUBLIC_ORIGIN}/remotes/cart/mf-manifest.json" >/dev/null
          curl -fsS "${PUBLIC_ORIGIN}/remotes/checkout/mf-manifest.json" >/dev/null
